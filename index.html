<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Case Verification Portal</title>
    <style>
        body {font-family: Arial, sans-serif; margin:0; padding:0; background:#f4f4f4; color:#333;}
        header {background:#1a2b4c; color:white; padding:20px; text-align:center;}
        .container {max-width:800px; margin:40px auto; background:white; padding:40px; border-radius:8px; box-shadow:0 4px 15px rgba(0,0,0,0.1); text-align:center;}
        .logo {margin:20px 0;}
        input {padding:15px; width:300px; font-size:18px; border:2px solid #1a2b4c; border-radius:5px; text-align:center;}
        button {padding:15px 40px; background:#1a2b4c; color:white; border:none; border-radius:5px; font-size:18px; cursor:pointer; margin-top:20px;}
        button:hover {background:#2c4a7a;}
        .loading {display:none; margin:20px auto; border:4px solid #f3f3f3; border-top:4px solid #1a2b4c; border-radius:50%; width:50px; height:50px; animation:spin 1s linear infinite;}
        @keyframes spin {0%{transform:rotate(0deg);} 100%{transform:rotate(360deg);}}
        footer {background:#1a2b4c; color:white; text-align:center; padding:15px; position:fixed; bottom:0; width:100%;}
        .result {display:none; margin:30px 0; padding:20px; background:#e8f5e9; border-radius:5px; border-left:5px solid #4caf50;}
    </style>
</head>
<body>
    <header><h1>Official Case Verification System</h1><p>Secure Access Portal - Authorized Personnel Only</p></header>
    <div class="container">
        <div class="logo"><img src="logo34.png" alt="Logo" onerror="this.src='https://via.placeholder.com/250x100?text=OFFICIAL+LOGO';"></div>
        <h2>Enter Case ID for Verification</h2>
        <input type="text" id="caseId" placeholder="Enter Case ID (e.g. 556221)" maxlength="10">
        <button onclick="startVerification()">Verify Case</button>
        <div class="status" id="status"></div>
        <div class="loading" id="loader"></div>
        <div class="result" id="result">
            <h3 id="resultText"></h3>
            <p id="dateInfo"></p>
            <button onclick="proceedNext()">Next</button>
        </div>
    </div>
    <footer><p>© 2026 Washington State Department of Justice - All Rights Reserved</p><p>Confidential | Do Not Share</p></footer>

    <script>
        let currentCaseId = '';
        function getRedmondDate() {
            const options = { timeZone: 'America/Los_Angeles', year:'numeric', month:'long', day:'numeric', hour:'2-digit', minute:'2-digit'};
            return new Date().toLocaleString('en-US', options) + ' (Redmond, WA)';
        }
        function startVerification() {
            const cid = document.getElementById('caseId').value.trim();
            if(!cid) {document.getElementById('status').innerHTML = '<span style="color:red;">Enter a valid Case ID, you horny fucker</span>'; return;}
            currentCaseId = cid;
            document.getElementById('status').textContent = `Verifying ${cid}...`;
            document.getElementById('loader').style.display = 'block';
            setTimeout(() => {
                document.getElementById('loader').style.display = 'none';
                document.getElementById('resultText').textContent = `1 search found for Case ID ${cid}`;
                document.getElementById('dateInfo').textContent = `Date: ${getRedmondDate()}`;
                document.getElementById('result').style.display = 'block';
                document.getElementById('status').innerHTML = '';
            }, 30000);
        }
        function proceedNext() {
            document.getElementById('status').textContent = 'Processing your dirty request...';
            document.getElementById('loader').style.display = 'block';
            document.getElementById('result').style.display = 'none';
            setTimeout(() => {
                if(currentCaseId === '556221') window.location.href = 'jame.html';
                else if(currentCaseId === '997204') window.location.href = 'rody.html';
                else document.getElementById('status').innerHTML = '<span style="color:red;">No redirect for this ID, bitch. Try again.</span>';
            }, 5000);
        }
    </script>
</body>
</html>
